name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  java-tests:
    name: Java tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run Maven tests
        run: mvn -B -ntp test

  node-security:
    name: Node security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run audit
        run: npm run audit
