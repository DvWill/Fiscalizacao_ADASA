<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Fiscalizações</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/app.css" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="shortcut icon" href="./favicon.svg" />
</head>
<body class="auth-page h-full">
  <main class="auth-layout min-h-full px-4 py-6 sm:px-6 sm:py-8">
    <section class="auth-showcase">
      <h1 class="auth-headline max-w-none">Mapas COFA</h1>
    </section>

    <section class="glass-card auth-card w-full max-w-md justify-self-end rounded-[2rem] border border-slate-200 p-6 sm:p-8">
      <div class="auth-card-header">
        <div class="auth-card-mark">
          <svg class="icon-min h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path d="M12 21s-6-5.2-6-10a6 6 0 1112 0c0 4.8-6 10-6 10z"></path>
            <circle cx="12" cy="11" r="2.5"></circle>
          </svg>
        </div>
        <div>
          <p class="auth-card-kicker">Acesso seguro</p>
          <h2 class="text-2xl font-bold text-white">Entrar no sistema</h2>
          <p class="text-sm text-slate-400">Use suas credenciais para acessar o painel completo.</p>
        </div>
      </div>

      <form id="login-form" class="space-y-4">
        <div>
          <label for="login" class="mb-2 block text-sm font-medium text-slate-300">Login</label>
          <input
            id="login"
            name="login"
            type="text"
            autocomplete="username"
            required
            class="input-field w-full px-4 py-3 text-sm"
            placeholder="Seu login"
          />
        </div>

        <div>
          <label for="senha" class="mb-2 block text-sm font-medium text-slate-300">Senha</label>
          <input
            id="senha"
            name="senha"
            type="password"
            autocomplete="current-password"
            required
            class="input-field w-full px-4 py-3 text-sm"
            placeholder="Sua senha"
          />
        </div>

        <p id="login-error" class="hidden rounded-2xl border border-red-300/40 bg-red-50/70 px-4 py-3 text-sm text-red-500"></p>

        <button
          id="login-submit"
          type="submit"
          class="btn-primary w-full px-4 py-3 text-sm font-semibold"
        >
          Entrar
        </button>

        <a
          href="/publico.html"
          class="block w-full border border-slate-600 px-4 py-3 text-center text-sm font-medium text-slate-200 transition-colors"
        >
          Ver mapa público
        </a>
      </form>
    </section>
  </main>

  <script>
    const externalApiBaseUrl = String(window.__FISCALIZACOES_API_BASE_URL__ || "").trim();
    const defaultApiBaseUrl = "/api";
    const apiBaseUrl = externalApiBaseUrl || defaultApiBaseUrl;

    function setLoginError(message) {
      const error = document.getElementById("login-error");
      if (!error) return;
      if (!message) {
        error.classList.add("hidden");
        error.textContent = "";
        return;
      }
      error.textContent = message;
      error.classList.remove("hidden");
    }

    async function checkExistingSession() {
      try {
        const response = await fetch(`${apiBaseUrl}/auth/me`, {
          method: "GET",
          credentials: "include"
        });
        if (response.ok) {
          window.location.replace("/");
          return true;
        }
      } catch {
        // ignora erro de rede e permanece na tela de login
      }
      return false;
    }

    async function handleLoginSubmit(event) {
      event.preventDefault();
      setLoginError("");

      const submit = document.getElementById("login-submit");
      const loginInput = document.getElementById("login");
      const senhaInput = document.getElementById("senha");
      if (!submit || !loginInput || !senhaInput) return;

      const login = loginInput.value.trim();
      const senha = senhaInput.value;
      if (!login || !senha) {
        setLoginError("Informe login e senha.");
        return;
      }

      submit.disabled = true;
      submit.textContent = "Entrando...";

      try {
        const response = await fetch(`${apiBaseUrl}/auth/login`, {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ login, senha })
        });

        const payload = await response.json().catch(() => ({}));
        if (response.ok) {
          window.location.replace("/");
          return;
        }

        if (response.status === 401) {
          setLoginError("Login ou senha inválidos.");
          return;
        }

        if (response.status === 503) {
          setLoginError("Login não configurado no servidor.");
          return;
        }

        setLoginError(payload.error || "Não foi possível autenticar agora.");
      } catch {
        setLoginError("Falha de conexão. Tente novamente.");
      } finally {
        submit.disabled = false;
        submit.textContent = "Entrar";
      }
    }

    document.getElementById("login-form")?.addEventListener("submit", handleLoginSubmit);
    checkExistingSession();
  </script>
</body>
</html>
