quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/fiscalizacoes}
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.max-size=${DB_MAX_POOL_SIZE:16}
quarkus.datasource.jdbc.min-size=${DB_MIN_POOL_SIZE:1}

# Espelhamento opcional: grava em um H2 local alem do banco principal (ex.: Neon).
app.mirror.enabled=${MIRROR_ENABLED:false}
app.mirror.jdbc.url=${MIRROR_JDBC_DATABASE_URL:}
app.mirror.username=${MIRROR_DB_USER:sa}
app.mirror.password=${MIRROR_DB_PASSWORD:sa}

# Desenvolvimento local: usa H2 por padrao para evitar erro 500 sem Postgres.
# Se quiser Postgres no dev, defina DEV_DB_KIND/DEV_JDBC_DATABASE_URL/DEV_DB_USER/DEV_DB_PASSWORD.
%dev.quarkus.datasource.db-kind=${DEV_DB_KIND:h2}
%dev.quarkus.datasource.jdbc.url=${DEV_JDBC_DATABASE_URL:${JDBC_DATABASE_URL:jdbc:h2:file:./data/fiscalizacoes;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
%dev.quarkus.datasource.username=${DEV_DB_USER:${DB_USER:sa}}
%dev.quarkus.datasource.password=${DEV_DB_PASSWORD:${DB_PASSWORD:sa}}
%dev.app.mirror.enabled=${MIRROR_ENABLED:true}
%dev.app.mirror.jdbc.url=${MIRROR_JDBC_DATABASE_URL:jdbc:h2:file:./data/fiscalizacoes_mirror;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
%dev.app.mirror.username=${MIRROR_DB_USER:sa}
%dev.app.mirror.password=${MIRROR_DB_PASSWORD:sa}

quarkus.http.host=localhost
quarkus.http.port=${PORT:8080}
